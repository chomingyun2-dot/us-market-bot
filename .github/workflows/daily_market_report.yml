name: Daily US Market Report

# 매일 한국 시간 7시(UTC 22시, 이전날)에 실행
on:
  schedule:
    # 매일 22:00 UTC (한국 시간 다음날 07:00)
    - cron: '0 22 * * *'
  
  # 수동 실행 버튼도 추가
  workflow_dispatch:

jobs:
  market_report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests pyyaml
      
      - name: Run market analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python us_market_bot.py
      
      - name: Commit and push report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Market Bot"
          git add us_market_reports/
          git commit -m "📊 Daily US market report - $(date -u +'%Y-%m-%d')" || echo "No changes to commit"
          git push
        continue-on-error: true
      
      - name: Upload to artifacts
        uses: actions/upload-artifact@v3
        with:
          name: market-reports
          path: us_market_reports/
          retention-days: 30
